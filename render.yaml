services:
  - type: web
    name: lead-enrichment-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PAGESPEED_API_KEY
        value: AIzaSyCg3RAx-ss516ij84fPWJk08Gc4DhSu3TU
    plan: free
